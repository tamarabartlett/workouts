<div class="login-page">
  <mat-card class="login-card" appearance="outlined">
    <mat-card-header>
      <mat-card-title>Sign in</mat-card-title>
      <mat-card-subtitle>Workouts</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput type="text" formControlName="username" autocomplete="username" />
          @if (form.controls.username.hasError('required') && form.controls.username.touched) {
            <mat-error>Username is required</mat-error>
          }
        </mat-form-field>
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput type="password" formControlName="password" autocomplete="current-password" />
          @if (form.controls.password.hasError('required') && form.controls.password.touched) {
            <mat-error>Password is required</mat-error>
          }
        </mat-form-field>
        @if (error()) {
          <p class="form-error" role="alert">{{ error() }}</p>
        }
        <div class="actions">
          <button matButton="filled" type="submit" [disabled]="form.invalid">Sign in</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>
</div>
